<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZapIA</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <style>
        body { color: #1f2937; }
        .muted { color: #6b7280; }
        .stats { display: flex; gap: 10px; flex-wrap: wrap; }
        .stat { border: 1px solid #d1d5db; border-radius: 6px; padding: 10px; min-width: 140px; }
        .chat-shell { background: #efeae2; border: 1px solid #d8d5cf; border-radius: 10px; padding: 12px; }
        .message-row { display: flex; margin-bottom: 10px; }
        .message-row.system { justify-content: center; }
        .bubble { background: #ffffff; border-radius: 8px; padding: 8px 10px; max-width: 76%; box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08); }
        .bubble.system { background: #fff7c2; max-width: 90%; }
        .bubble-header { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
        .bubble-media img, .bubble-media video { max-width: 260px; max-height: 260px; border-radius: 6px; display: block; margin-top: 6px; }
        .bubble-media audio { margin-top: 6px; display: block; }
        .bubble-meta { margin-top: 6px; font-size: 11px; color: #6b7280; text-align: right; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
    <nav class="mb-4">
        <a class="me-3 text-decoration-none" href="{% url 'imports:home' %}">Inicio</a>
        <a class="me-3 text-decoration-none" href="{% url 'imports:chat_list' %}">Chats</a>
        <a class="me-3 text-decoration-none" href="{% url 'imports:contact_lookup' %}">Buscar Contato</a>
        <a class="text-decoration-none" href="/admin/">Admin</a>
    </nav>
    {% block content %}{% endblock %}
    </div>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
</body>
</html>
